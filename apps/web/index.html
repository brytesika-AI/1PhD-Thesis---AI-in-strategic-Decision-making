<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI-SRF Executive Decision OS</title>
  <meta name="description" content="AI-SRF executive decision command center.">
  <style>
    :root {
      --header: #0D1F33;
      --gold: #C8922A;
      --red: #A8401E;
      --green: #2A6645;
      --ink: #111821;
      --muted: #66717d;
      --line: #dce2e8;
      --bg: #f6f8fa;
      --surface: #ffffff;
      --soft: #eef3f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, "IBM Plex Sans", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .58; }
    .pattern {
      height: 10px;
      background:
        linear-gradient(135deg, transparent 25%, var(--gold) 25% 50%, transparent 50% 75%, var(--red) 75%) 0 0 / 28px 10px,
        linear-gradient(225deg, transparent 25%, var(--red) 25% 50%, transparent 50% 75%, var(--gold) 75%) 14px 0 / 28px 10px;
    }
    header {
      min-height: 74px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 16px 24px;
      background: var(--header);
      color: #fff;
    }
    .wordmark { font-size: 27px; font-weight: 850; line-height: 1; }
    .subtitle {
      margin-top: 7px;
      color: rgba(255,255,255,.64);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .identity {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .identity span, .identity button {
      min-height: 30px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      padding: 7px 10px;
      background: transparent;
      color: #fff;
    }
    .login-screen {
      min-height: calc(100vh - 94px);
      display: grid;
      place-items: center;
      padding: 28px;
    }
    .login-card {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-top: 5px solid var(--gold);
      border-radius: 8px;
      padding: 24px;
      background: var(--surface);
    }
    label {
      display: block;
      margin: 0 0 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
    }
    input, select, textarea {
      width: 100%;
      margin: 0 0 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
    }
    textarea { min-height: 142px; resize: vertical; }
    .hidden { display: none; }
    .shell {
      min-height: calc(100vh - 94px);
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
    }
    aside {
      border-right: 1px solid var(--line);
      padding: 18px;
      background: var(--surface);
    }
    .control-note {
      margin: 2px 0 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .main {
      min-width: 0;
      display: grid;
      gap: 1px;
      background: var(--line);
    }
    .section {
      padding: 22px 24px;
      background: var(--surface);
    }
    .section h2 {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .verdict {
      position: sticky;
      top: 0;
      z-index: 3;
      display: grid;
      grid-template-columns: minmax(240px, 1.15fr) repeat(4, minmax(130px, .65fr));
      gap: 1px;
      padding: 0;
      background: var(--line);
    }
    .verdict-card {
      min-height: 128px;
      padding: 18px;
      background: var(--surface);
      display: grid;
      align-content: start;
      gap: 7px;
    }
    .verdict-card h2 {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .verdict-action {
      color: var(--red);
      font-size: 48px;
      font-weight: 900;
      line-height: .98;
      overflow-wrap: anywhere;
    }
    .metric-value {
      font-size: 31px;
      font-weight: 850;
      line-height: 1.08;
      overflow-wrap: anywhere;
    }
    .card-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .narrative-text {
      max-width: 1040px;
      font-size: 18px;
      line-height: 1.55;
    }
    .summary-line {
      margin-bottom: 14px;
      font-size: 22px;
      font-weight: 850;
      line-height: 1.32;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .plain-card {
      min-height: 124px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }
    .plain-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .plain-card p, .plain-card li {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }
    .plain-card p { margin: 0; }
    ul.clean {
      margin: 0;
      padding-left: 18px;
    }
    .risk-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .commands {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .command, .primary, .approval {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--header);
      color: #fff;
      font-weight: 850;
    }
    .primary {
      width: 100%;
      background: var(--gold);
      color: var(--ink);
    }
    .approval.approve { background: var(--green); }
    .approval.reject { background: var(--red); }
    .secondary { background: var(--soft); color: var(--ink); border: 1px solid var(--line); }
    .status-pill {
      display: inline-flex;
      width: fit-content;
      min-height: 28px;
      align-items: center;
      border-radius: 8px;
      padding: 6px 9px;
      background: var(--soft);
      color: var(--ink);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }
    .status-pill.pending { background: #fff4d9; color: #7a5200; }
    .status-pill.approved { background: #e4f1e9; color: var(--green); }
    .status-pill.rejected { background: #f9e7e2; color: var(--red); }
    details.drawer {
      border-top: 1px solid var(--line);
      background: var(--surface);
    }
    details.drawer > summary {
      min-height: 54px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
      cursor: pointer;
    }
    .technical-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 0 24px 24px;
    }
    pre {
      max-height: 360px;
      overflow: auto;
      margin: 0;
      border-radius: 8px;
      padding: 12px;
      background: #101820;
      color: #edf2f7;
      font: 12px Consolas, "IBM Plex Mono", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 8px;
      border: 2px solid rgba(17,24,33,.3);
      border-top-color: var(--ink);
      border-radius: 50%;
      vertical-align: -2px;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 1180px) {
      .shell, .verdict, .grid-3, .risk-band { grid-template-columns: 1fr; }
      .verdict { position: static; }
      .technical-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 680px) {
      header { grid-template-columns: 1fr; }
      .identity { justify-content: flex-start; }
      .commands { grid-template-columns: 1fr; }
      .verdict-action { font-size: 40px; }
      .section { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="pattern"></div>
  <header>
    <div>
      <div class="wordmark">AI-SRF</div>
      <div class="subtitle">Strategic Resilience Framework</div>
    </div>
    <div class="identity">
      <span id="userName">Not signed in</span>
      <span id="orgName">No organization</span>
      <button id="logoutButton" type="button">Logout</button>
    </div>
  </header>
  <div class="pattern"></div>

  <section id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-card">
      <h1 class="wordmark" style="color: var(--header);">AI-SRF</h1>
      <p class="control-note">Sign in to review board-level decisions, approval gates, and supporting evidence.</p>
      <label for="apiBaseLogin">Worker API</label>
      <input id="apiBaseLogin" value="https://ai-srf-governance-worker.bryte-sika.workers.dev">
      <label for="email">Email</label>
      <input id="email" type="email" value="analyst@board.example">
      <label for="role">Role</label>
      <select id="role">
        <option value="analyst">analyst</option>
        <option value="executive">executive</option>
        <option value="admin">admin</option>
      </select>
      <label for="organizationId">Organization ID</label>
      <input id="organizationId" value="board-alpha">
      <label for="organizationName">Organization Name</label>
      <input id="organizationName" value="Board Alpha">
      <label for="passcode">Access Passcode</label>
      <input id="passcode" type="password" placeholder="Enter passcode">
      <button class="primary" type="submit">Login</button>
    </form>
  </section>

  <section id="appShell" class="shell hidden">
    <aside>
      <label for="goal">Decision Case</label>
      <textarea id="goal">The board of a South African financial services company must decide whether to migrate customer analytics workloads to a cloud AI platform while facing load-shedding risk, POPIA compliance obligations, vendor lock-in concerns, and pressure to improve decision speed before the next reporting cycle.</textarea>
      <label for="stage">Entry Point</label>
      <select id="stage"></select>
      <p class="control-note">Executives approve or reject recommendations. Analysts and admins may run decision preparation.</p>
      <button class="primary" id="runGovernedCycle" type="button">Run Decision Preparation</button>
      <div class="commands">
        <button class="command secondary" id="runSimulation" type="button">Simulate</button>
        <button class="command secondary" id="stressTest" type="button">Stress Test</button>
        <button class="command secondary" id="challengeAssumptions" type="button">Challenge</button>
        <button class="command secondary" id="reopenCase" type="button">Re-open</button>
      </div>
    </aside>

    <main class="main">
      <section id="executiveVerdict" class="verdict" aria-live="polite"></section>
      <section id="strategicNarrative" class="section"></section>
      <section id="governanceControls" class="section"></section>
      <section id="boardAttention" class="section"></section>
      <section id="decisionOptions" class="section"></section>
      <section id="riskSimulation" class="section"></section>
      <section id="learningTrust" class="section"></section>
      <details id="technicalDrawer" class="drawer">
        <summary>Technical Details</summary>
        <div id="technicalDetails" class="technical-grid"></div>
      </details>
    </main>
  </section>
  <div class="pattern"></div>

  <script type="module" src="./components/executive-components.js"></script>
</body>
</html>
